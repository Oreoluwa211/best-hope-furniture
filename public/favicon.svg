<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2018"/>
      <stop offset="100%" stop-color="#1C1410"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Gold border ring -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="12" fill="none" stroke="#B8743C" stroke-width="1.5" opacity="0.8"/>

  <!-- Sofa silhouette -->
  <!-- Main seat body -->
  <rect x="12" y="32" width="40" height="12" rx="4" fill="#B8743C"/>
  <!-- Back cushion left -->
  <rect x="12" y="22" width="17" height="12" rx="3" fill="#D9C9A8"/>
  <!-- Back cushion right -->
  <rect x="35" y="22" width="17" height="12" rx="3" fill="#D9C9A8"/>
  <!-- Left armrest -->
  <rect x="8" y="26" width="8" height="16" rx="3" fill="#B8743C"/>
  <!-- Right armrest -->
  <rect x="48" y="26" width="8" height="16" rx="3" fill="#B8743C"/>
  <!-- Legs -->
  <rect x="14" y="43" width="4" height="5" rx="1.5" fill="#D9C9A8" opacity="0.7"/>
  <rect x="46" y="43" width="4" height="5" rx="1.5" fill="#D9C9A8" opacity="0.7"/>
  <rect x="30" y="43" width="4" height="5" rx="1.5" fill="#D9C9A8" opacity="0.7"/>

  <!-- BH text below -->
  <text x="32" y="58" font-family="Georgia,serif" font-size="7" font-weight="bold"
        fill="#B8743C" text-anchor="middle" letter-spacing="1">BH</text>
</svg>